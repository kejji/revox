name: Deploy backend to Lambda

on:
  push:
    branches: [ main ]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure esbuild is available
        run: npm i -D esbuild

      - name: Create build folders
        run: |
          rm -rf dist .lambda-entry
          mkdir -p dist .lambda-entry

      - name: Create Lambda entrypoints
        run: |
          cat > .lambda-entry/index-entry.js <<'EOF'
          import * as mod from "../index.js";
          export const handler = mod.handler;
          EOF

          cat > .lambda-entry/worker-entry.js <<'EOF'
          import * as mod from "../worker.js";
          export const handler = mod.handler;
          EOF

          cat > .lambda-entry/userSync-entry.js <<'EOF'
          import * as mod from "../userSync.js";
          export const handler = mod.handler;
          EOF

          cat > .lambda-entry/ingestScheduler-entry.js <<'EOF'
          import * as mod from "../ingestScheduler.js";
          export const handler = mod.handler;
          EOF

          cat > .lambda-entry/themesWorker-entry.js <<'EOF'
          import * as mod from "../themesWorker.js";
          export const handler = mod.handler;
          EOF

          cat > .lambda-entry/themesScheduleRunner-entry.js <<'EOF'
          import * as mod from "../themesScheduleRunner.js";
          export const handler = mod.handler;
          EOF

          cat > .lambda-entry/alertNotifier-entry.js <<'EOF'
          import * as mod from "../alertNotifier.js";
          export const handler = mod.handler;
          EOF

      - name: Bundle main handler
        run: |
          npx esbuild .lambda-entry/index-entry.js \
            --bundle \
            --platform=node \
            --target=node18 \
            --format=cjs \
            --banner:js="globalThis.crypto = require('crypto').webcrypto;" \
            --outfile=dist/index.js

      - name: Bundle worker
        run: |
          npx esbuild .lambda-entry/worker-entry.js \
            --bundle \
            --platform=node \
            --target=node18 \
            --format=cjs \
            --banner:js="globalThis.crypto = require('crypto').webcrypto;" \
            --outfile=dist/worker.js

      - name: Bundle userSync
        run: |
          npx esbuild .lambda-entry/userSync-entry.js \
            --bundle \
            --platform=node \
            --target=node18 \
            --format=cjs \
            --banner:js="globalThis.crypto = require('crypto').webcrypto;" \
            --outfile=dist/userSync.js

      - name: Bundle ingestScheduler
        run: |
          npx esbuild .lambda-entry/ingestScheduler-entry.js \
            --bundle \
            --platform=node \
            --target=node18 \
            --format=cjs \
            --banner:js="globalThis.crypto = require('crypto').webcrypto;" \
            --outfile=dist/ingestScheduler.js

      - name: Bundle themesWorker
        run: |
          npx esbuild .lambda-entry/themesWorker-entry.js \
            --bundle \
            --platform=node \
            --target=node18 \
            --format=cjs \
            --banner:js="globalThis.crypto = require('crypto').webcrypto;" \
            --outfile=dist/themesWorker.js

      - name: Bundle themesScheduleRunner
        run: |
          npx esbuild .lambda-entry/themesScheduleRunner-entry.js \
            --bundle \
            --platform=node \
            --target=node18 \
            --format=cjs \
            --banner:js="globalThis.crypto = require('crypto').webcrypto;" \
            --outfile=dist/themesScheduleRunner.js

      - name: Bundle alertNotifier
        run: |
          npx esbuild .lambda-entry/alertNotifier-entry.js \
            --bundle \
            --platform=node \
            --target=node18 \
            --format=cjs \
            --banner:js="globalThis.crypto = require('crypto').webcrypto;" \
            --outfile=dist/alertNotifier.js

      - name: Validate Lambda exports
        run: |
          node -e "for (const f of ['index','worker','userSync','ingestScheduler','themesWorker','themesScheduleRunner','alertNotifier']) { const m = require('./dist/' + f + '.js'); console.log(f, Object.keys(m)); if (typeof m.handler !== 'function') throw new Error(f + '.handler missing'); }"

      - name: Package bundle into zip
        run: |
          cd dist
          zip revox-backend.zip \
            index.js \
            worker.js \
            userSync.js \
            ingestScheduler.js \
            themesWorker.js \
            themesScheduleRunner.js \
            alertNotifier.js

      - name: Debug zip content
        run: |
          unzip -l dist/revox-backend.zip
          unzip -p dist/revox-backend.zip worker.js | grep "handler"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code --function-name revox-backend          --zip-file fileb://dist/revox-backend.zip --region eu-west-3
          aws lambda update-function-code --function-name revox-worker           --zip-file fileb://dist/revox-backend.zip --region eu-west-3
          aws lambda update-function-code --function-name revox-user-sync        --zip-file fileb://dist/revox-backend.zip --region eu-west-3
          aws lambda update-function-code --function-name revox-ingest-scheduler --zip-file fileb://dist/revox-backend.zip --region eu-west-3
          aws lambda update-function-code --function-name revox-themes-worker    --zip-file fileb://dist/revox-backend.zip --region eu-west-3
          aws lambda update-function-code --function-name revox-themes-scheduler --zip-file fileb://dist/revox-backend.zip --region eu-west-3
          aws lambda update-function-code --function-name revox-alert-notifier   --zip-file fileb://dist/revox-backend.zip --region eu-west-3